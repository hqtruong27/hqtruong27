name: main

on:
  push:
    branches:
      - master
  # Enable manual run from Github interface
  workflow_dispatch:
  # Run every 2 hours
  schedule:
    - cron: "0 */2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          
      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome
        
      - name: Create .env file
        run: |
          cat <<EOF > .env
          URI_BANDORI=${{ secrets.URI_BANDORI }}
          URI_BANDORI_IMAGE=${{ secrets.URI_BANDORI_IMAGE }}
          URI_LOVE_LIVE=${{ secrets.URI_LOVE_LIVE }}
          EOF

      - name: Crawl cover photo
        run: npm run start
      - name: UPDATE COVER PHOTO (PUSH ON GITHUB) ⬆️⬆️
        # update code
        run: |
          git config --global user.email "hqtruong27@gmail.com"
          git config --global user.name "Truong Hoang"
          git add .
          git commit -m "Updated cover photo 🌸🌸🌸" || echo "No changes to commit"
          git push -f
